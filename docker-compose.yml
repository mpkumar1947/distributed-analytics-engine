# docker-compose.yml

services:
  redis:
    image: redis:7-alpine
    container_name: redis_broker
    ports:
      - "127.0.0.1:6379:6379" 
    restart: unless-stopped
    networks:
      - app_network

  api:
    build:
      context: .  
      dockerfile: ./api/Dockerfile 
    container_name: backend_api
    ports:
      - "127.0.0.1:8000:8000" 
    environment:
      # These will be pulled from the .env file on the VM
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./api:/app/api
    networks:
      - app_network

networks:
  app_network:
    driver: bridge