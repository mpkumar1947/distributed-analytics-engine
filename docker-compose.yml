# docker-compose.yml

services:
  db:
    image: postgres:15
    container_name: postgres_gradedb
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "127.0.0.1:5432:5432" # Changed to localhost for better security
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: gradedb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d gradedb -q"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  

  api:
    build:
      context: .  # Build context is the project root
      dockerfile: ./api/Dockerfile # Path to api's Dockerfile relative to context
    container_name: backend_api
    ports:
      - "127.0.0.1:8000:8000" # Mapped to localhost on VPS; Cloudflare Tunnel connects to this
    environment:
      - DATABASE_URL=postgresql+asyncpg://testuser:testpassword@db:5432/gradedb
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_PLOT_STORAGE_CHANNEL_ID=${TELEGRAM_PLOT_STORAGE_CHANNEL_ID}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./api:/app/api        
      - ./alembic:/app/alembic 
      - ./alembic.ini:/app/alembic.ini 
      - ./scripts:/app/scripts 
      - ./data:/app/data       
      - app_network

  

 

volumes:
  postgres_data:
    name: iitkgradedb_pgdata # Explicitly naming the volume

networks:
  app_network:
    driver: bridge
